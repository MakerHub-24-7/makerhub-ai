name: MakerHub AI Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pandas numpy markdown requests

      - name: Run MakerHub Analyzer
        run: |
          python scripts/analyze_repo.py

      - name: Commit Generated Report
        run: |
          git config --global user.name "MakerHub-AI"
          git config --global user.email "ai@makerhub.local"

          git add reports/

          git commit -m "AI generated organization report" || echo "No changes to commit"

          git push
